  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    h2 {
      margin-top: 0;
      font-size: 24px;
    }

    p {
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      background: white;
      color: #764ba2;
      padding: 15px 30px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }

    .btn:active {
      transform: translateY(0);
    }

    #action-container {
      margin-top: 20px;
    }

<body>
  <div class="container">
    <h2 id="title">Action Required</h2>
    <p id="message">Please click the button below to continue in the app</p>
    <div id="action-container">
      <a href="autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER" id="deeplink" class="btn">Open Auto
        Assist
        App</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const urlParams = new URLSearchParams(window.location.search);
      const uid = urlParams.get('uid');
      const type = urlParams.get('type');
      const status = urlParams.get('status');

      let title = 'Action Required';
      let message = 'Please click the button below to continue in the app';
      let deepLink = `autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER`;
      let buttonText = 'Open Auto Assist App';

      if (type === 'refresh') {
        title = 'Session Expired';
        message = 'Please tap the button to try again';
        deepLink = `autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER?type=refresh`;
      } else if (type === 'return') {
        title = 'Setup Complete!';
        message = 'You can now return to the app';
        deepLink = `autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER?type=return`;
      } else if (type === 'checkout') {
        if (status === 'success') {
          title = 'Payment Successful!';
          message = 'Thank you! You can now return to the app';
          deepLink = `autoassistliveprod://autoassistliveprod.com/U7userFOUNDpaywall?status=success`;
        } else {
          title = 'Payment Cancelled';
          message = 'The payment process was not completed';
          deepLink = `autoassistliveprod://autoassistliveprod.com/U7userFOUNDpaywall?status=cancel`;
        }
      }

      document.getElementById('title').textContent = title;
      document.getElementById('message').textContent = message;
      document.getElementById('deeplink').href = deepLink;
      document.getElementById('deeplink').textContent = buttonText;
    });
  </script>
</body>
