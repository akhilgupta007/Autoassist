    <div class="spinner"></div>
    <h2 id="title">Redirecting to Auto Assist...</h2>
    <p id="message">Please wait a moment</p>
    <div id="fallback">
      <p>App didn't open automatically?</p>
      <a href="autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER" id="deeplink">Open Auto Assist
        App</a>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const urlParams = new URLSearchParams(window.location.search);
      const uid = urlParams.get('uid');
      const type = urlParams.get('type');
      const status = urlParams.get('status');

      let title = 'Redirecting to Auto Assist...';
      let message = 'Please wait a moment';
      let deepLink = `autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER`;

      if (type === 'refresh') {
        title = 'Session Expired';
        message = 'Please try again';
        deepLink = `autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER?type=refresh`;
      } else if (type === 'return') {
        title = 'Setup Complete!';
        message = 'Taking you back to the app...';
        deepLink = `autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER?type=return`;
      } else if (type === 'checkout') {
        if (status === 'success') {
          title = 'Payment Successful!';
          message = 'Taking you back to the app...';
          deepLink = `autoassistliveprod://autoassistliveprod.com/U7userFOUNDpaywall?status=success`;
        } else {
          title = 'Payment Cancelled';
          message = 'Taking you back to the app...';
          deepLink = `autoassistliveprod://autoassistliveprod.com/U7userFOUNDpaywall?status=cancel`;
        }
      }

      document.getElementById('title').textContent = title;
      document.getElementById('message').textContent = message;
      document.getElementById('deeplink').href = deepLink;

      // Try to open app immediately
      setTimeout(() => {
        window.location.href = deepLink;
      }, 500);

      // Show fallback link after 2 seconds if app doesn't open
      setTimeout(() => {
        document.getElementById('fallback').style.display = 'block';
      }, 2000);
