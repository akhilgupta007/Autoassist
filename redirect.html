<!DOCTYPE html>
<html>
<head>
  <title>Redirecting to Auto Assist...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      max-width: 400px;
    }
    h2 { margin-top: 0; }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    a {
      color: white;
      text-decoration: underline;
      font-weight: 600;
    }
    #fallback {
      display: none;
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h2 id="title">Redirecting to Auto Assist...</h2>
    <p id="message">Please wait a moment</p>
    <div id="fallback">
      <p>App didn't open automatically?</p>
      <a href="#" id="deeplink">Open Auto Assist App</a>
    </div>
  </div>
  
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const type = urlParams.get('type');
    
    // Determine status message
    const isRefresh = type === 'refresh';
    const status = isRefresh ? 'refresh' : 'complete';
    
    if (isRefresh) {
      document.getElementById('title').textContent = 'Session Expired';
      document.getElementById('message').textContent = 'Please try again';
    } else {
      document.getElementById('title').textContent = 'Setup Complete!';
      document.getElementById('message').textContent = 'Taking you back to the app...';
    }
    
    // Build deep link
    const deepLink = `autoassistliveprod://autoassistliveprod.com/A7PROPaymentpageDRAWER?uid=${uid}&status=${status}`;
    
    document.getElementById('deeplink').href = deepLink;
    
    // Try to open app immediately
    setTimeout(() => {
      window.location.href = deepLink;
    }, 500);
    
    // Show fallback link after 2 seconds if app doesn't open
    setTimeout(() => {
      document.getElementById('fallback').style.display = 'block';
    }, 2000);
  </script>
</body>
</html>
